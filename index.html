<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Life Hutto | Reach. Connect. Renew.</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛪</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #5a5a5a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #333;
            overflow: hidden;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .church-name {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .address {
            color: #ffffff;
            font-size: 0.9rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .address a {
            color: #ffffff;
            text-decoration: none;
        }
        
        .address a:hover {
            text-decoration: underline;
        }
        
        .tagline {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 16px;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .social-icon {
            color: #ffffff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        
        .social-icon:hover {
            opacity: 0.8;
        }
        
        .social-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .link-btn {
            display: flex;
            align-items: center;
            background: #4a4a4a;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            text-decoration: none;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        
        .link-btn:hover {
            border-color: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }
        
        .link-thumb {
            width: 54px;
            height: 54px;
            min-width: 54px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px 0 0 50px;
            overflow: hidden;
            margin: 4px;
            border-radius: 50%;
        }
        
        .link-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .link-thumb-text {
            color: rgba(255,255,255,0.9);
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .link-text {
            flex: 1;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            padding-right: 60px;
        }
        
        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
        }
        
        .footer a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
        }
    </style>
</head>

        <!-- Link Buttons -->
